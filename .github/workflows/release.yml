name: Release

# Build the distribution and publish it to PyPI.
#
# Publishing uses PyPI Trusted Publishing (OpenID Connect) — there are NO
# stored API tokens or passwords. The exchange of the short-lived OIDC token
# is what requires `permissions: id-token: write` on the publishing jobs.
#
# Triggers:
#   * push of a tag matching `v*` (e.g. v1.1.0)     -> publish to PyPI
#   * `workflow_dispatch` on a `v*` tag ref         -> publish to PyPI
#     (used by prepare-release.yml: tag pushes made with GITHUB_TOKEN do not
#     trigger workflows, so the release run is dispatched explicitly on the tag)
#   * `workflow_dispatch` on a branch ref           -> publish to TestPyPI (dry run)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish to PyPI when running on a version tag ref (pushed or
    # dispatched on the tag by prepare-release.yml).
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/libopenschichtplaner5/
    permissions:
      id-token: write   # mandatory for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Manual dry-run publish to TestPyPI (dispatch on a branch, not a tag).
    if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/libopenschichtplaner5/
    permissions:
      id-token: write   # mandatory for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
