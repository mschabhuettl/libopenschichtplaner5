name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev,postgres]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -v

  pg-parity:
    name: PG parity (postgres:16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package + dev deps
        run: pip install -e ".[dev,postgres]"

      # DATABASE_URL routes the ORM mirror in the test suite to real
      # PostgreSQL (see tests/conftest.py) instead of the SQLite stand-in.
      - name: Pytest against PostgreSQL
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres
        run: pytest -v

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Audits the runtime dependencies (incl. the postgres extra); dev tools
      # are not shipped and therefore not installed here.
      - name: Audit Python dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[postgres]"
          pip-audit
